<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 620" width="1000" height="620"
  font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arr"  markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0 0 6 8 3" fill="#475569"/></marker>
    <marker id="arrG" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0 0 6 8 3" fill="#16a34a"/></marker>
    <marker id="arrO" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0 0 6 8 3" fill="#ea580c"/></marker>
  </defs>

  <!-- ── 背景 ─────────────────────────────────────────────────── -->
  <rect width="1000" height="620" fill="#f8fafc" rx="12"/>
  <text x="500" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#1e293b">operationModeStateMachine</text>

  <!-- ═══════════════════════════════════════════════════════════
       頂層：NORMAL ↔ IPQC
  ════════════════════════════════════════════════════════════ -->

  <!-- NORMAL → IPQC -->
  <line x1="262" y1="53" x2="738" y2="53" stroke="#ea580c" stroke-width="1.5" marker-end="url(#arrO)"/>
  <text x="500" y="47" text-anchor="middle" font-size="10" fill="#ea580c">ENTER_IPQC</text>

  <!-- IPQC → NORMAL -->
  <path d="M738,73 C610,98 390,98 262,73" fill="none" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrG)"/>
  <text x="500" y="100" text-anchor="middle" font-size="10" fill="#16a34a">ENTER_IPQC (toggle) · EXIT_TO_NORMAL</text>

  <!-- ── Initial marker ── -->
  <circle cx="70" cy="63" r="9" fill="#1e293b"/>
  <line x1="79" y1="63" x2="98" y2="63" stroke="#1e293b" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ── NORMAL ── -->
  <rect x="100" y="39" width="160" height="48" rx="24" fill="#f0fdf4" stroke="#16a34a" stroke-width="2.5"/>
  <text x="180" y="69" text-anchor="middle" font-size="14" font-weight="bold" fill="#15803d">NORMAL</text>

  <!-- ── IPQC ── -->
  <rect x="740" y="39" width="160" height="48" rx="24" fill="#fff7ed" stroke="#ea580c" stroke-width="2.5"/>
  <text x="820" y="69" text-anchor="middle" font-size="14" font-weight="bold" fill="#9a3412">IPQC</text>

  <!-- ── NORMAL → UNLOAD ── -->
  <line x1="180" y1="87" x2="180" y2="118" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="190" y="108" font-size="9" fill="#475569">ENTER_UNLOAD</text>

  <!-- ── IPQC → UNLOAD ── -->
  <line x1="820" y1="87" x2="820" y2="118" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="755" y="108" font-size="9" fill="#475569">ENTER_UNLOAD</text>

  <!-- ═══════════════════════════════════════════════════════════
       UNLOAD compound state
  ════════════════════════════════════════════════════════════ -->
  <rect x="40" y="120" width="920" height="475" rx="14"
    fill="#f0f9ff" stroke="#7dd3fc" stroke-width="2" stroke-dasharray="8,5"/>
  <text x="58" y="145" font-size="12" font-weight="bold" fill="#0369a1">UNLOAD</text>

  <!-- UNLOAD self-loop: ENTER_UNLOAD (reset) -->
  <path d="M420,120 C440,100 480,100 500,120" fill="none" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="460" y="97" text-anchor="middle" font-size="9" fill="#475569">ENTER_UNLOAD (reset)</text>

  <!-- EXIT_TO_NORMAL — 左側 -->
  <path d="M40,360 L14,360 L14,63 L98,63" fill="none" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrG)"/>
  <text x="6" y="212" text-anchor="middle" font-size="9" fill="#16a34a" transform="rotate(-90,6,212)">EXIT_TO_NORMAL</text>

  <!-- ENTER_IPQC from UNLOAD — 右側 -->
  <path d="M960,360 L986,360 L986,63 L902,63" fill="none" stroke="#ea580c" stroke-width="1.5" marker-end="url(#arrO)"/>
  <text x="994" y="212" text-anchor="middle" font-size="9" fill="#ea580c" transform="rotate(90,994,212)">ENTER_IPQC</text>

  <!-- REPLACE_SLOT_SUBMITTED → NORMAL（虛線，跨越 compound 邊界） -->
  <path d="M760,332 L760,107 L160,107 L160,87"
    fill="none" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrG)"/>
  <text x="510" y="104" text-anchor="middle" font-size="9" font-weight="bold" fill="#16a34a">REPLACE_SLOT_SUBMITTED</text>

  <!-- ── UNLOAD initial dot + ROUTING diamond ── -->
  <circle cx="85" cy="355" r="7" fill="#0284c7"/>
  <line x1="92" y1="355" x2="107" y2="355" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ROUTING diamond：center (145,355), hw=30 hh=22 -->
  <polygon points="145,333 175,355 145,377 115,355" fill="#e0f2fe" stroke="#0284c7" stroke-width="1.5"/>
  <text x="145" y="352" text-anchor="middle" font-size="9.5" font-weight="bold" fill="#0369a1">ROUT-</text>
  <text x="145" y="364" text-anchor="middle" font-size="9.5" font-weight="bold" fill="#0369a1">ING</text>

  <!-- ROUTING → UNLOAD_SCAN -->
  <path d="M145,333 L145,295 L183,295" fill="none" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="162" y="288" text-anchor="middle" font-size="9" fill="#475569">pack_auto_slot</text>

  <!-- ROUTING → FORCE_SLOT_SCAN -->
  <path d="M145,377 L145,420 L183,420" fill="none" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="162" y="416" text-anchor="middle" font-size="9" fill="#475569">force_single_slot</text>

  <!-- ── UNLOAD_SCAN：x=183 y=271 w=185 h=48，center(275,295) ── -->
  <rect x="183" y="271" width="185" height="48" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="275" y="291" text-anchor="middle" font-size="12" font-weight="bold" fill="#1d4ed8">UNLOAD_SCAN</text>
  <text x="275" y="308" text-anchor="middle" font-size="9.5" fill="#64748b">掃卸除捲號（自動定位）</text>

  <!-- ── FORCE_SLOT_SCAN：x=183 y=396 w=190 h=48，center(278,420) ── -->
  <rect x="183" y="396" width="190" height="48" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="278" y="416" text-anchor="middle" font-size="12" font-weight="bold" fill="#1d4ed8">FORCE_SLOT_SCAN</text>
  <text x="278" y="433" text-anchor="middle" font-size="9.5" fill="#64748b">掃站位強制卸除</text>

  <!-- UNLOAD_SCAN → REPLACE_MATERIAL_SCAN -->
  <path d="M368,295 L413,348" fill="none" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="408" y="304" font-size="9" fill="#475569">UNLOAD_SUBMITTED</text>

  <!-- FORCE_SLOT_SCAN → REPLACE_MATERIAL_SCAN -->
  <path d="M373,420 L413,368" fill="none" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="407" y="416" font-size="9" fill="#475569">FORCE_UNLOAD_SUBMITTED</text>

  <!-- ── REPLACE_MATERIAL_SCAN：x=415 y=332 w=200 h=48，center(515,356) ── -->
  <rect x="415" y="332" width="200" height="48" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="515" y="351" text-anchor="middle" font-size="10.5" font-weight="bold" fill="#1d4ed8">REPLACE_MATERIAL_SCAN</text>
  <text x="515" y="368" text-anchor="middle" font-size="9.5" fill="#64748b">掃更換捲號</text>

  <!-- REPLACE_MATERIAL_SCAN → REPLACE_SLOT_SCAN -->
  <line x1="615" y1="356" x2="658" y2="356" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="636" y="344" text-anchor="middle" font-size="7.5" fill="#475569">REPLACEMENT_MATERIAL</text>
  <text x="636" y="354" text-anchor="middle" font-size="7.5" fill="#475569">_SCANNED</text>

  <!-- ── REPLACE_SLOT_SCAN：x=660 y=332 w=195 h=48，center(757,356) ── -->
  <rect x="660" y="332" width="195" height="48" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="757" y="351" text-anchor="middle" font-size="10.5" font-weight="bold" fill="#1d4ed8">REPLACE_SLOT_SCAN</text>
  <text x="757" y="368" text-anchor="middle" font-size="9.5" fill="#64748b">掃站位確認換料完成</text>

  <!-- ── 圖例 ──────────────────────────────────────────────────── -->
  <rect x="55" y="540" width="440" height="44" rx="8" fill="none" stroke="#cbd5e1" stroke-width="1"/>
  <text x="70" y="556" font-size="10" font-weight="bold" fill="#475569">圖例</text>

  <!-- NORMAL 樣式 -->
  <rect x="70" y="562" width="30" height="14" rx="7" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="108" y="573" font-size="10" fill="#475569">正常 / IPQC 頂層狀態</text>

  <!-- UNLOAD_SCAN 樣式 -->
  <rect x="240" y="562" width="30" height="14" rx="3" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="278" y="573" font-size="10" fill="#475569">UNLOAD 子狀態</text>

  <!-- ROUTING 樣式 -->
  <polygon points="380,576 392,569 404,576 392,583" fill="#e0f2fe" stroke="#0284c7" stroke-width="1.2"/>
  <text x="412" y="578" font-size="10" fill="#475569">guard 路由</text>
</svg>
